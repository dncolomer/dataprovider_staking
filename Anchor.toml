# Anchor.toml — cluster-specific settings.
#
# `[provider]` is the ACTIVE cluster `anchor deploy`/`anchor test` will use.
# For local work keep `cluster = "localnet"`. To deploy to devnet later, flip
# it (or pass `--provider.cluster devnet`) and make sure your wallet has
# devnet SOL.

[toolchain]
package_manager = "npm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
dataprovider_staking = "GyZKxaZaLZtKLes5JgJfEHZUBhrtuMgTNtuLiEU59Bqd"

[programs.devnet]
dataprovider_staking = "AnConH6PVX1UQYtdPgAgUNMowphcragEjbGsx3nQJ6up"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "cargo test -p dataprovider_staking --release"

[hooks]
